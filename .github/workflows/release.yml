name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      body: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Generate changelog for this release
        id: cliff
        uses: orhun/git-cliff-action@98c93442bb05a455a77bee982867857ae748eeea # v4
        with:
          config: cliff.toml
          args: --latest --strip header

  build:
    name: Build & Release (${{ matrix.platform }})
    needs: release-notes
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: packages/app/src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: pnpm install

      - name: Verify updater signing key
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is empty!"
            exit 1
          fi
          LINE_COUNT=$(echo "$TAURI_SIGNING_PRIVATE_KEY" | wc -l | tr -d ' ')
          CHAR_COUNT=${#TAURI_SIGNING_PRIVATE_KEY}
          echo "Signing key present: ${CHAR_COUNT} chars, ${LINE_COUNT} lines"
          if echo "$TAURI_SIGNING_PRIVATE_KEY" | head -1 | grep -q "^untrusted comment:"; then
            echo "Key format: OK (starts with 'untrusted comment:')"
          else
            echo "::warning::Key does NOT start with 'untrusted comment:' — may be malformed"
          fi
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" ]; then
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is empty"
          else
            echo "Key password: set (${#TAURI_SIGNING_PRIVATE_KEY_PASSWORD} chars)"
          fi

      - uses: tauri-apps/tauri-action@51a9f1156b33df106d827c3a78f8f894946c5faa # v0.5.25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/app
          tagName: v__VERSION__
          releaseName: 'AIbubu v__VERSION__'
          releaseBody: ${{ needs.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  redeploy-site:
    name: Redeploy Website
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
