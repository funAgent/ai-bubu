[meta]
id = "windsurf"
name = "Windsurf AI"
category = "ide"
priority = 9

[detect]
adapter = "sqlite"
[detect.paths]
macos = "${APP_SUPPORT}/Windsurf/User/globalStorage/state.vscdb"
linux = "${HOME}/.config/Windsurf/User/globalStorage/state.vscdb"
windows = "${APPDATA}/Windsurf/User/globalStorage/state.vscdb"

[activity]
adapter = "sqlite"

[activity.sqlite]
table = "cursorDiskKV"
latest_query = """
SELECT
  json_extract(value, '$.lastUpdatedAt') as ts,
  json_extract(value, '$.status') as status,
  json_extract(value, '$.totalLinesAdded') as lines_added,
  json_extract(value, '$.filesChangedCount') as files_changed
FROM cursorDiskKV
WHERE key >= 'composerData:' AND key < 'composerDataa'
ORDER BY json_extract(value, '$.lastUpdatedAt') DESC
LIMIT 1
"""
timestamp_field = "ts"
status_field = "status"
metrics_fields = ["lines_added", "files_changed"]

[activity.status_map]
generating = "active_high"
streaming = "active_high"

[process_fallback]
enabled = true
names = ["windsurf", "windsurf helper"]
